<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidig Cika - Leaderboard Kelas</title>
    <!-- CDN Wajib Sesuai Bagian 12 -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.22.0/dist/pocketbase.umd.js"></script>
    <script src="/app.js"></script>
    <link rel="stylesheet" href="/style.css">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f2fbfd",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary-fixed-dim": "#8bd0ef",
                        "surface-tint": "#116681",
                        "inverse-on-surface": "#e9f2f4",
                        "surface-dim": "#d3dcde",
                        "secondary-container": "#8debff",
                        "surface-container-highest": "#dbe4e6",
                        "on-tertiary-container": "#a5dede",
                        "on-secondary-fixed-variant": "#004e5a",
                        "on-tertiary-fixed-variant": "#0f4f4f",
                        "on-background": "#141d1f",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#001f2a",
                        "primary-container": "#09637e",
                        "secondary": "#006877",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#98d1d1",
                        "on-surface": "#141d1f",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#40484c",
                        "secondary-fixed-dim": "#76d4e7",
                        "on-primary-container": "#98ddfc",
                        "surface-bright": "#f2fbfd",
                        "surface-variant": "#dbe4e6",
                        "tertiary": "#0a4c4c",
                        "on-secondary-fixed": "#001f25",
                        "on-tertiary-fixed": "#002020",
                        "on-secondary-container": "#006b7a",
                        "outline": "#70787d",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#a3eeff",
                        "background": "#f2fbfd",
                        "surface-container-low": "#ecf5f7",
                        "surface-container-high": "#e1eaec",
                        "on-primary-fixed-variant": "#004d63",
                        "on-error": "#ffffff",
                        "primary": "#004a5f",
                        "tertiary-fixed": "#b4eded",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#bce9ff",
                        "inverse-primary": "#8bd0ef",
                        "outline-variant": "#bfc8cd",
                        "inverse-surface": "#293234",
                        "surface-container": "#e6eff1",
                        "tertiary-container": "#2b6464"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Lexend"],
                        "body": ["Lexend"],
                        "label": ["Lexend"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Lexend', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .custom-glass {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>

    <script>
        if (!pb.authStore.isValid) {
            sessionStorage.setItem('redirect_message', 'Sesi berakhir, silakan login kembali.');
            window.location.href = '/index.html';
        }
    </script>
</head>

<body
    class="bg-surface text-on-surface min-h-screen selection:bg-secondary-container selection:text-on-secondary-container">

    <!-- TopNavBar -->
    <header
        class="fixed top-0 w-full z-40 bg-white/70 backdrop-blur-md shadow-sm shadow-cyan-900/5 h-16 px-8 flex justify-between items-center max-w-full mx-auto">
        <div class="flex items-center gap-8">
            <span class="text-xl font-bold text-cyan-900 font-headline tracking-wide">Sidig Cika</span>
            <nav class="hidden md:flex items-center gap-6">
                <a class="text-cyan-700 font-bold border-b-2 border-cyan-700 text-sm tracking-wide py-1"
                    href="/dashboard.html">Dashboard</a>
                <a class="text-cyan-600/70 hover:text-cyan-900 transition-colors font-medium text-sm tracking-wide py-1"
                    href="/profile.html">Profil</a>
                <a class="text-cyan-600/70 hover:text-cyan-900 transition-colors font-medium text-sm tracking-wide py-1"
                    href="/pameran.html">Pameran</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="logout()"
                class="text-cyan-800 font-bold text-sm tracking-wide hover:text-cyan-600 transition-all duration-200">Keluar</button>
        </div>
    </header>

    <main class="pt-24 pb-12 px-4 md:px-8 max-w-6xl mx-auto min-h-screen relative">
        <div class="flex flex-col gap-2 mb-8">
            <span class="text-[0.75rem] font-bold uppercase tracking-[0.05em] text-secondary">Statistik Akademik</span>
            <h1 class="text-[1.75rem] font-semibold tracking-[-0.01em] text-on-surface">Leaderboard Kelas</h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <!-- Main Leaderboard Table -->
            <div
                class="lg:col-span-12 bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm shadow-primary-container/5 relative">

                <div id="table-error" class="hidden p-8 text-center text-gray-500">
                    <p class="mb-4">Gagal memuat data.</p>
                    <button onclick="fetchAndRenderLeaderboard()"
                        class="px-4 py-2 bg-primary text-white rounded hover:bg-cyan-900 transition font-bold">Coba
                        Lagi</button>
                </div>

                <div class="overflow-x-auto w-full" id="leaderboard-table">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-surface-container text-on-surface-variant">
                                <th class="px-6 py-4 font-semibold text-xs uppercase tracking-wider"># Rank</th>
                                <th class="px-6 py-4 font-semibold text-xs uppercase tracking-wider">Kelas</th>
                                <th class="px-6 py-4 font-semibold text-xs uppercase tracking-wider text-center">Total
                                    Poin</th>
                                <th class="px-6 py-4 font-semibold text-xs uppercase tracking-wider text-center">Jumlah
                                    Karya</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body" class="divide-y divide-outline-variant/10">
                            <tr>
                                <td colspan="4" class="py-12 text-center text-gray-500 font-medium">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Floating Action Button -->
    <button id="fab-submit" onclick="openModal()"
        class="fixed bottom-8 right-8 w-14 h-14 bg-primary-container text-white rounded-full flex items-center justify-center shadow-lg hover:bg-primary hover:scale-110 active:scale-95 transition-all z-40 outline-none focus:ring-4 focus:ring-secondary disabled:opacity-50 disabled:cursor-not-allowed">
        <span class="material-symbols-outlined text-2xl" id="fab-icon">add</span>
        <span id="fab-text" class="hidden font-mono text-sm tracking-widest absolute"></span>
    </button>

    <!-- Modal Submit -->
    <div id="submit-modal"
        class="fixed inset-0 z-[60] bg-on-surface/40 backdrop-blur-sm hidden items-center justify-center p-4 transition-opacity opacity-0">
        <div class="bg-white w-full max-w-[480px] rounded-xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 border-b border-outline-variant/10 flex justify-between items-center">
                <h2 class="text-xl font-bold text-primary">Kumpulkan Naskah</h2>
                <button type="button" onclick="closeModal()"
                    class="text-on-surface-variant hover:text-on-surface outline-none">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <form id="submit-form" class="p-6 flex flex-col gap-5">
                <div id="modal-error"
                    class="hidden p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-200"></div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-[0.75rem] font-bold text-on-surface-variant uppercase tracking-wider">Judul
                        Naskah</label>
                    <div class="relative">
                        <input id="title-input"
                            class="w-full bg-surface-container-low border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-secondary transition-all pr-12"
                            required maxlength="150" placeholder="Masukkan judul menarik..." type="text" />
                        <span class="absolute bottom-3 right-3 text-[10px] text-outline"><span
                                id="title-counter">0</span> / 150</span>
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label
                        class="text-[0.75rem] font-bold text-on-surface-variant uppercase tracking-wider">Deskripsi</label>
                    <div class="relative">
                        <textarea id="desc-input"
                            class="w-full bg-surface-container-low border-none rounded-lg p-3 text-sm focus:ring-2 focus:ring-secondary transition-all resize-none pr-12"
                            rows="4" maxlength="500"
                            placeholder="Tuliskan sinopsis singkat atau latar belakang karya..."></textarea>
                        <span class="absolute bottom-3 right-3 text-[10px] text-outline"><span
                                id="desc-counter">0</span> / 500</span>
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-[0.75rem] font-bold text-on-surface-variant uppercase tracking-wider">File
                        PDF</label>

                    <div id="file-drop-area"
                        class="border-2 border-dashed border-outline-variant rounded-lg p-6 flex flex-col items-center justify-center gap-2 hover:bg-surface-container transition-all cursor-pointer">
                        <input type="file" id="file-input" accept="application/pdf" class="hidden" required>
                        <button type="button" id="file-btn" class="hidden text-sm">Pilih PDF</button>
                        <span class="material-symbols-outlined text-primary-container text-3xl">cloud_upload</span>
                        <p id="file-info-text" class="text-xs font-medium text-on-surface-variant">Klik untuk unggah
                            atau seret file PDF di sini</p>
                        <p class="text-[10px] text-outline">Maksimal 5MB</p>
                    </div>
                    <p id="file-error" class="text-red-500 text-xs mt-1 hidden"></p>
                </div>

                <button id="submit-btn"
                    class="w-full bg-gradient-to-br from-primary-container to-primary text-white font-bold py-3.5 rounded-lg shadow-md hover:shadow-lg transition-all mt-2 active:scale-[0.98] outline-none"
                    type="submit">
                    Kirim Karya
                </button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Init Lucide
        lucide.createIcons();

        // Elemen DOM Leaderboard
        const tableBody = document.getElementById('leaderboard-body');
        const tableError = document.getElementById('table-error');
        const tableContainer = document.getElementById('leaderboard-table');

        // Elemen DOM Modal
        const modal = document.getElementById('submit-modal');
        const submitForm = document.getElementById('submit-form');
        const modalError = document.getElementById('modal-error');
        const submitBtn = document.getElementById('submit-btn');

        // Elemen FAB
        const fabButton = document.getElementById('fab-submit');
        const fabIcon = document.getElementById('fab-icon');
        const fabText = document.getElementById('fab-text');

        // State Cooldown
        let cooldownInterval = null;

        /**
         * LEADERBOARD LOGIC
         */
        function renderLeaderboard(data) {
            tableBody.innerHTML = '';
            tableError.classList.add('hidden');
            tableContainer.classList.remove('hidden');

            if (data.length === 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = '<td colspan="4" class="py-8 text-center text-gray-500">Belum ada karya yang di-ACC.</td>';
                tableBody.appendChild(tr);
                return;
            }

            const currentKelas = pb.authStore.model?.Kelas;

            data.forEach((item, index) => {
                const tr = document.createElement('tr');

                let rowClass = 'transition-colors ' +
                    (currentKelas && item.Kelas === currentKelas
                        ? 'bg-surface-container-lowest border-l-[3px] border-blue-600 hover:bg-surface-container'
                        : 'bg-surface-container-lowest hover:bg-surface-container');

                let rankBadge = '';

                if (index === 0) {
                    rowClass = 'bg-[#fef9c3] hover:bg-[#fef08a] transition-colors';
                    rankBadge = `<div class="flex items-center gap-2 pl-2"><span class="material-symbols-outlined text-amber-500" style="font-variation-settings: 'FILL' 1;">workspace_premium</span><span class="font-bold">1</span></div>`;
                } else if (index === 1) {
                    rowClass = 'bg-[#f3f4f6] hover:bg-[#e5e7eb] transition-colors';
                    rankBadge = `<div class="flex items-center gap-2 pl-2"><span class="material-symbols-outlined text-slate-400" style="font-variation-settings: 'FILL' 1;">workspace_premium</span><span class="font-bold">2</span></div>`;
                } else if (index === 2) {
                    rowClass = 'bg-[#fff7ed] hover:bg-[#ffedd5] transition-colors';
                    rankBadge = `<div class="flex items-center gap-2 pl-2"><span class="material-symbols-outlined text-orange-400" style="font-variation-settings: 'FILL' 1;">workspace_premium</span><span class="font-bold">3</span></div>`;
                } else {
                    rankBadge = `<span class="font-bold pl-4">${index + 1}</span>`;
                }

                tr.className = rowClass;

                let kelasTeks = (currentKelas && item.Kelas === currentKelas)
                    ? `<div class="flex flex-col"><span class="font-bold text-blue-700">${escapeHtml(item.Kelas)} (Kelas Anda)</span><span class="text-[10px] text-blue-500 uppercase font-bold tracking-tighter">Current Rank</span></div>`
                    : `<span class="font-medium">${escapeHtml(item.Kelas)}</span>`;

                tr.innerHTML = `
                    <td class="px-6 py-5">${rankBadge}</td>
                    <td class="px-6 py-5">${kelasTeks}</td>
                    <td class="px-6 py-5 text-center font-bold text-primary">${item.totalScore}</td>
                    <td class="px-6 py-5 text-center">${item.jumlahKarya}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        async function fetchAndRenderLeaderboard() {
            try {
                const records = await pb.collection('submissions').getFullList({
                    filter: 'status = "accepted"',
                    expand: 'user_id',
                    fields: 'id,user_id,score,expand.user_id.name,expand.user_id.Kelas'
                });

                // Hitung TOTAL score per kelas di JS
                const kelasMap = {};
                records.forEach(r => {
                    const kelas = r.expand?.user_id?.Kelas ?? 'Tidak Diketahui';
                    if (!kelasMap[kelas]) {
                        kelasMap[kelas] = { Kelas: kelas, totalScore: 0, jumlahKarya: 0 };
                    }
                    kelasMap[kelas].totalScore += r.score;
                    kelasMap[kelas].jumlahKarya += 1;
                });

                const sorted = Object.values(kelasMap)
                    .sort((a, b) => b.totalScore - a.totalScore);

                const isTeacher = pb.authStore.model?.role === 'teacher';
                const displayed = isTeacher ? sorted : sorted.slice(0, 10);

                renderLeaderboard(displayed);
            } catch (error) {
                console.error('Fetch error:', error);
                tableContainer.classList.add('hidden');
                tableError.classList.remove('hidden');
                tableError.innerHTML = `<p class="mb-4 text-red-500 font-medium">Gagal memuat data:<br/>${error.message}</p><button onclick="fetchAndRenderLeaderboard()" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition">Coba Lagi</button>`;
            }
        }

        // Jalankan fetch awal dan subscribe real-time
        fetchAndRenderLeaderboard().then(() => {
            pb.collection('submissions').subscribe('*', async () => {
                await fetchAndRenderLeaderboard();
            });
        });

        window.addEventListener('beforeunload', () => {
            if (cooldownInterval) clearInterval(cooldownInterval);
            pb.collection('submissions').unsubscribe('*');
        });

        /**
         * COOLDOWN LOGIC
         */
        function setFabNormal() {
            fabButton.disabled = false;
            fabIcon.classList.remove('hidden');
            fabText.classList.add('hidden');
            fabButton.classList.remove('bg-gray-400', 'hover:bg-gray-400', 'cursor-not-allowed', 'w-auto', 'px-6', 'rounded-full');
            fabButton.classList.add('bg-primary-container', 'hover:bg-primary', 'w-14', 'h-14', 'rounded-full');
            if (cooldownInterval) {
                clearInterval(cooldownInterval);
                cooldownInterval = null;
            }
        }

        function setFabCooldown(timeStr) {
            fabButton.disabled = true;
            fabIcon.classList.add('hidden');
            fabText.classList.remove('hidden');
            fabText.textContent = timeStr;

            // Adjust width to fit text tracking
            fabButton.classList.remove('w-14', 'bg-primary-container', 'hover:bg-primary');
            fabButton.classList.add('bg-gray-400', 'cursor-not-allowed', 'w-auto', 'px-6');
        }

        function updateFabCooldown() {
            const lastSubmit = localStorage.getItem('last_submit_time');
            if (!lastSubmit) { setFabNormal(); return; }

            const sisa = 60 - Math.floor((Date.now() - Number(lastSubmit)) / 1000); // cooldown 60 detik
            if (sisa <= 0) { setFabNormal(); return; }

            const mm = String(Math.floor(sisa / 60)).padStart(2, '0');
            const ss = String(sisa % 60).padStart(2, '0');
            setFabCooldown(`${mm}:${ss}`);
        }

        function startCooldown(seconds) {
            localStorage.setItem('last_submit_time', String(Date.now() - (60 - seconds) * 1000)); // cooldown 60 detik
            updateFabCooldown();
            if (!cooldownInterval) {
                cooldownInterval = setInterval(updateFabCooldown, 1000);
            }
        }

        // Init cooldown
        updateFabCooldown();
        if (localStorage.getItem('last_submit_time') && fabButton.disabled) {
            cooldownInterval = setInterval(updateFabCooldown, 1000);
        }

        /**
         * MODAL & FORM LOGIC
         */
        function openModal() {
            if (fabButton.disabled) return;
            resetModal();
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            // Small timeout for fade effect
            setTimeout(() => {
                modal.classList.add('opacity-100');
            }, 10);
        }

        function closeModal() {
            modal.classList.remove('opacity-100');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                resetModal();
            }, 200);
        }

        function resetModal() {
            submitForm.reset();
            modalError.classList.add('hidden');
            modalError.textContent = '';
            document.getElementById('file-error').classList.add('hidden');
            document.getElementById('file-info-text').textContent = 'Klik untuk unggah atau seret file PDF di sini';
            document.getElementById('file-info-text').classList.remove('font-bold', 'text-primary');
            document.getElementById('title-counter').textContent = '0';
            document.getElementById('desc-counter').textContent = '0';

            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Kirim Karya';
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function showErrorInModal(msg) {
            modalError.textContent = msg;
            modalError.classList.remove('hidden');
        }

        // Character counters
        const titleInput = document.getElementById('title-input');
        const descInput = document.getElementById('desc-input');

        titleInput.addEventListener('input', () => {
            document.getElementById('title-counter').textContent = titleInput.value.length;
        });

        descInput.addEventListener('input', () => {
            document.getElementById('desc-counter').textContent = descInput.value.length;
        });

        // File Input Kustom
        const fileArea = document.getElementById('file-drop-area');
        const fileBtn = document.getElementById('file-btn');
        const fileInput = document.getElementById('file-input');
        const fileInfoText = document.getElementById('file-info-text');
        const fileError = document.getElementById('file-error');

        fileBtn.addEventListener('click', () => fileInput.click());
        fileArea.addEventListener('click', (e) => {
            if (e.target !== fileBtn && e.target !== fileInput) {
                fileInput.click();
            }
        });

        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect(e) {
            fileError.classList.add('hidden');
            const file = e.target.files[0];

            if (!file) {
                fileInfoText.textContent = 'Klik untuk unggah atau seret file PDF di sini';
                fileInfoText.classList.remove('font-bold', 'text-primary');
                return;
            }

            if (file.type !== 'application/pdf') {
                fileError.textContent = 'Hanya file PDF yang diperbolehkan.';
                fileError.classList.remove('hidden');
                fileInput.value = '';
                fileInfoText.textContent = 'Klik untuk unggah atau seret file PDF di sini';
                fileInfoText.classList.remove('font-bold', 'text-primary');
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                fileError.textContent = 'Ukuran file melebihi 5MB.';
                fileError.classList.remove('hidden');
                fileInput.value = '';
                fileInfoText.textContent = 'Klik untuk unggah atau seret file PDF di sini';
                fileInfoText.classList.remove('font-bold', 'text-primary');
                return;
            }

            // Valid file
            const sizeKB = (file.size / 1024).toFixed(1);
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            const displaySize = file.size > 1024 * 1024 ? `${sizeMB} MB` : `${sizeKB} KB`;

            fileInfoText.textContent = `${file.name} (${displaySize})`;
            fileInfoText.classList.add('font-bold', 'text-primary');
        }

        // Submit via FastAPI
        submitForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const file = fileInput.files[0];
            const title = titleInput.value.trim();
            const desc = descInput.value.trim();

            if (!file) {
                fileError.textContent = 'Silakan pilih PDF terlebih dahulu.';
                fileError.classList.remove('hidden');
                return;
            }

            modalError.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin align-middle mr-2">progress_activity</span> Mengirim...';
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

            const formData = new FormData();
            formData.append('file', file);
            formData.append('title', title);
            formData.append('description', desc);

            try {
                const res = await fetch('http://localhost:8000/api/submit', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + pb.authStore.token },
                    body: formData
                });

                const data = await res.json();

                if (res.status === 200) {
                    localStorage.setItem('last_submit_time', String(Date.now()));
                    closeModal();
                    // Toast info (biru) — karya masuk antrean, belum tentu di-ACC
                    showToast('Karya Kamu masuk dalam Antrean ACC, Harap menunggu.', 'info');
                    updateFabCooldown();
                    if (!cooldownInterval) cooldownInterval = setInterval(updateFabCooldown, 1000);
                } else if (res.status === 429) {
                    closeModal();
                    startCooldown(data.retry_after_seconds);
                } else if (res.status === 401) {
                    logout();
                } else {
                    showErrorInModal(data.message || 'Terjadi kesalahan sistem.');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Kirim Karya';
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            } catch (error) {
                showToast('Server tidak bisa dihubungi. Pastikan backend sudah dijalankan.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Kirim Karya';
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        // Utilities
        function escapeHtml(unsafe) {
            if (!unsafe) return "";
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
