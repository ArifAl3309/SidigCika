<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pameran Karya - NaskahSiswa</title>
  <meta name="description" content="Galeri karya tulis siswa yang telah mendapat persetujuan guru.">

  <!-- CDN Wajib — urutan sesuai Bagian 12 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.22.0/dist/pocketbase.umd.js"></script>
  <script src="/app.js"></script>

  <!-- Cek token sebelum render apapun -->
  <script>
    if (!pb.authStore.isValid) {
      sessionStorage.setItem('redirect_message', 'Sesi berakhir, silakan login kembali.');
      window.location.href = '/index.html';
    }
  </script>

  <style>
    /* Grid 1 kolom mobile → 2 kolom desktop */
    .feed-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }
    @media (min-width: 768px) {
      .feed-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* Line-clamp deskripsi: max 3 baris */
    .desc-clamp {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- HEADER -->
  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="font-bold text-xl text-blue-600">NaskahSiswa</div>
        <span class="hidden sm:inline text-gray-400">|</span>
        <a href="/dashboard.html"
           class="hidden sm:flex items-center gap-1 text-sm text-gray-600 hover:text-gray-900 font-medium transition">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> Dashboard
        </a>
      </div>
      <nav class="flex items-center gap-4">
        <a href="/dashboard.html"
           class="sm:hidden text-gray-600 hover:text-gray-900">
          <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <a href="/profile.html"
           class="text-sm text-gray-600 hover:text-gray-900 font-medium flex items-center gap-1">
          <i data-lucide="user" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Profil</span>
        </a>
        <button onclick="logout()"
           class="text-sm text-red-600 hover:text-red-700 font-medium flex items-center gap-1">
          <i data-lucide="log-out" class="w-4 h-4"></i>
          <span class="hidden sm:inline">Keluar</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-5xl mx-auto px-4 py-8">

    <!-- Judul halaman -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
        <i data-lucide="image" class="w-6 h-6 text-blue-500"></i>
        Pameran Karya
      </h1>
      <p class="text-gray-500 text-sm mt-1">Karya tulis siswa yang telah mendapat persetujuan guru.</p>
    </div>

    <!-- State: loading -->
    <div id="state-loading" class="text-center py-16 text-gray-400">
      <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto mb-3"></i>
      <p>Memuat karya...</p>
    </div>

    <!-- State: error -->
    <div id="state-error" class="hidden text-center py-16">
      <i data-lucide="alert-circle" class="w-8 h-8 text-red-400 mx-auto mb-3"></i>
      <p class="text-red-500 font-medium mb-4">Gagal memuat data.</p>
      <button onclick="fetchAndRenderPameran()"
        class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition">
        Coba Lagi
      </button>
    </div>

    <!-- State: empty -->
    <div id="state-empty" class="hidden text-center py-16 text-gray-400">
      <i data-lucide="inbox" class="w-10 h-10 mx-auto mb-3"></i>
      <p class="text-lg font-medium">Belum ada karya yang dipamerkan.</p>
      <p class="text-sm mt-1">Karya yang di-ACC guru akan tampil di sini.</p>
    </div>

    <!-- Feed grid -->
    <div id="feed-grid" class="feed-grid hidden"></div>

  </main>

  <script>
    // ─── Init Lucide ─────────────────────────────────────────────────────────
    lucide.createIcons();

    // ─── Referensi elemen state ───────────────────────────────────────────────
    const stateLoading = document.getElementById('state-loading');
    const stateError   = document.getElementById('state-error');
    const stateEmpty   = document.getElementById('state-empty');
    const feedGrid     = document.getElementById('feed-grid');

    function showState(which) {
      stateLoading.classList.add('hidden');
      stateError.classList.add('hidden');
      stateEmpty.classList.add('hidden');
      feedGrid.classList.add('hidden');
      if (which === 'loading') stateLoading.classList.remove('hidden');
      else if (which === 'error')   stateError.classList.remove('hidden');
      else if (which === 'empty')   stateEmpty.classList.remove('hidden');
      else if (which === 'feed')    feedGrid.classList.remove('hidden');
    }

    // ─── renderPameran ────────────────────────────────────────────────────────
    function renderPameran(records) {
      if (records.length === 0) {
        showState('empty');
        return;
      }

      feedGrid.innerHTML = '';

      records.forEach(record => {
        const name  = record.expand?.user_id?.name  || 'Anonim';
        const kelas = record.expand?.user_id?.Kelas
                   || record.expand?.user_id?.kelas
                   || '';
        const initials = getInitials(name);
        const avatarBg = getAvatarColor(name);
        const pdfUrl   = pb.files.getUrl(record, record.file);
        const tanggal  = formatDate(record.created);
        const desc     = record.description ? record.description.trim() : '';

        const card = document.createElement('article');
        card.className = 'bg-white rounded-xl shadow-md p-5 flex flex-col gap-3 hover:shadow-lg transition-shadow';

        // Baris atas: avatar + nama + pill kelas
        const kelasHtml = kelas
          ? `<span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-600 font-medium ml-2">${kelas}</span>`
          : '';

        card.innerHTML = `
          <!-- Baris atas: avatar + nama + kelas -->
          <div class="flex items-center gap-2">
            <div style="
              width:32px; height:32px; border-radius:50%;
              background:${avatarBg};
              display:flex; align-items:center; justify-content:center;
              color:white; font-weight:500; font-size:0.8rem;
              flex-shrink:0;
            ">${initials}</div>
            <span class="font-medium text-gray-800 text-sm">${name}</span>
            ${kelasHtml}
          </div>

          <!-- Judul karya -->
          <h2 style="font-size:1.1rem; font-weight:600; color:#111827; line-height:1.4;">
            ${record.title}
          </h2>

          <!-- Preview deskripsi (max 3 baris) -->
          ${desc
            ? `<p class="desc-clamp text-sm text-gray-500 leading-relaxed">${desc}</p>`
            : `<p class="text-sm text-gray-400 italic">Tidak ada deskripsi.</p>`
          }

          <!-- Baris bawah: tanggal + tombol baca -->
          <div class="flex items-center justify-between mt-auto pt-2 border-t border-gray-100">
            <span class="text-xs text-gray-400 flex items-center gap-1">
              <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
              ${tanggal}
            </span>
            <a href="${pdfUrl}" target="_blank" rel="noopener noreferrer"
               class="flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 text-white text-xs font-semibold rounded-lg hover:bg-blue-700 transition">
              <i data-lucide="book-open" class="w-3.5 h-3.5"></i>
              Baca Karya
            </a>
          </div>
        `;

        feedGrid.appendChild(card);
      });

      // Render ulang ikon Lucide yang baru ditambahkan
      lucide.createIcons();
      showState('feed');
    }

    // ─── fetchAndRenderPameran ────────────────────────────────────────────────
    async function fetchAndRenderPameran() {
      showState('loading');
      try {
        // Tidak pakai parameter 'fields' agar semua field termasuk file tersedia
        const records = await pb.collection('submissions').getFullList({
          filter: 'status = "accepted"',
          expand: 'user_id'
        });
        
        // Sorting dilakukan di frontend agar tidak 400 error dari backend
        records.sort((a, b) => new Date(b.updated) - new Date(a.updated));
        
        renderPameran(records);
      } catch (e) {
        console.error('Fetch pameran error:', e);
        showState('error');
      }
    }

    // ─── Real-time subscription ───────────────────────────────────────────────
    fetchAndRenderPameran().then(() => {
      pb.collection('submissions').subscribe('*', async () => {
        await fetchAndRenderPameran();
      });
    });

    window.addEventListener('beforeunload', () => {
      pb.collection('submissions').unsubscribe('*');
    });
  </script>
</body>
</html>
