<!DOCTYPE html>
<html class="light" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Masuk - Sidig Cika</title>

    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="/style.css">

                "surface-dim": "#d3dcde",
                "secondary-container": "#8debff",
                "surface-container-highest": "#dbe4e6",
                "on-tertiary-container": "#a5dede",
                "on-secondary-fixed-variant": "#004e5a",
                "on-tertiary-fixed-variant": "#0f4f4f",
                "on-background": "#141d1f",
                "on-primary": "#ffffff",
                "on-primary-fixed": "#001f2a",
                "primary-container": "#09637e",
                "secondary": "#006877",
                "on-tertiary": "#ffffff",
                "tertiary-fixed-dim": "#98d1d1",
                "on-surface": "#141d1f",
                "error": "#ba1a1a",
                "on-surface-variant": "#40484c",
                "secondary-fixed-dim": "#76d4e7",
                "on-primary-container": "#98ddfc",
                "surface-bright": "#f2fbfd",
                "surface-variant": "#dbe4e6",
                "tertiary": "#0a4c4c",
                "on-secondary-fixed": "#001f25",
                "on-tertiary-fixed": "#002020",
                "on-secondary-container": "#006b7a",
                "outline": "#70787d",
                "on-secondary": "#ffffff",
                "secondary-fixed": "#a3eeff",

                "surface-container-low": "#ecf5f7",
                "surface-container-high": "#e1eaec",

    <style>
        body { font-family: 'Lexend', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    
    <script>
        // Cek redirect jika sudah login
        if (pb.authStore.isValid) {
            window.location.href = pb.authStore.model.role === 'teacher' ? '/guru.html' : '/dashboard.html';
        }
    </script>
</head>
<body class="bg-[#EBF4F6] text-[#1a1a1a] min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-[400px]">
        <!-- Brand Identity Container -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-white shadow-sm mb-4">
                <span class="material-symbols-outlined text-[#09637E] text-4xl">auto_stories</span>
            </div>
            <h1 class="text-2xl font-bold tracking-tight mb-2">Sidig Cika</h1>
            <p class="text-[#6b7280] text-sm font-medium">Platform Karya Tulis Siswa</p>
        </div>

        <!-- Login Card -->
        <div class="bg-[#ffffff] border border-[#EBF4F6] rounded-xl p-8 shadow-sm">
            <form id="login-form" class="space-y-6">
                <!-- Error Message (Hidden by default) -->
                <div id="error-msg" class="hidden bg-red-50 text-red-600 text-xs font-medium p-4 rounded-lg text-center border border-red-200">
                    Email atau password yang Anda masukkan salah. Silakan coba lagi.
                </div>

                <!-- Input Group: Email -->
                <div class="space-y-2">
                    <label class="block text-xs font-semibold text-[#1a1a1a] uppercase" for="email">Email Sekolah</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-[#6b7280] text-lg">alternate_email</span>
                        </div>
                        <input class="block w-full pl-11 pr-4 py-3 bg-[#EBF4F6] border-none rounded-lg text-[#1a1a1a] placeholder:text-[#6b7280] focus:ring-2 focus:ring-[#09637E] focus:bg-white transition-all outline-none" id="email" placeholder="admin@sekolah.sch.id" type="email" required/>
                    </div>
                </div>

                <!-- Input Group: Password -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="block text-xs font-semibold text-[#1a1a1a] uppercase" for="password">Password</label>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-[#6b7280] text-lg">lock</span>
                        </div>
                        <input class="block w-full pl-11 pr-12 py-3 bg-[#EBF4F6] border-none rounded-lg text-[#1a1a1a] placeholder:text-[#6b7280] focus:ring-2 focus:ring-[#09637E] focus:bg-white transition-all outline-none" id="password" placeholder="••••••••" type="password" required/>
                        <button class="absolute inset-y-0 right-0 pr-4 flex items-center" type="button" onclick="const p = document.getElementById('password'); p.type = p.type === 'password' ? 'text' : 'password';">
                            <span class="material-symbols-outlined text-[#6b7280] text-lg hover:text-[#1a1a1a] transition-colors">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Primary Action -->
                <button id="submit-btn" class="w-full bg-[#09637E] hover:bg-[#088395] py-3 rounded-lg text-white font-bold transition-colors outline-none" type="submit">
                    Masuk
                </button>
            </form>
        </div>

        <!-- Footer Credits -->
        <div class="mt-8 flex flex-col items-center space-y-4">
            <p class="text-xs text-[#6b7280] font-medium">© 2024 Sidig Cika Digital Curator platform.</p>
        </div>
    </div>

    <!-- SCRIPT ASLI DARI INDEX.HTML (TIDAK DIUBAH SAMA SEKALI) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            // Tampilkan pesan redirect dari halaman lain jika ada
            const msg = sessionStorage.getItem('redirect_message');
            if (msg) {
                showToast(msg, 'info');
                sessionStorage.removeItem('redirect_message');
            }

            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submit-btn');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.classList.add('hidden');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Memuat...';
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

                try {
                    await pb.collection('users').authWithPassword(emailInput.value, passwordInput.value);
                    localStorage.setItem('pb_token', pb.authStore.token);
                    localStorage.setItem('pb_user', JSON.stringify(pb.authStore.model));
                    
                    window.location.href = pb.authStore.model.role === 'teacher' ? '/guru.html' : '/dashboard.html';
                } catch (error) {
                    errorMsg.textContent = 'Login gagal. Periksa email dan password Anda.';
                    errorMsg.classList.remove('hidden');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Masuk';
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            });
        });
    </script>
</body>
</html>
