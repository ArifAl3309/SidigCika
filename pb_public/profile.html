<html lang="id">

                    "on-primary-fixed": "#001f2a",
                    "primary-container": "#09637e",
                    "secondary": "#006877",
                    "on-tertiary": "#ffffff",

                    "on-surface": "#141d1f",
                    "error": "#ba1a1a",

                    "secondary-fixed-dim": "#76d4e7",
                    "on-primary-container": "#98ddfc",
                    "surface-bright": "#f2fbfd",
                    "surface-variant": "#dbe4e6",
                    "tertiary": "#0a4c4c",
                    "on-secondary-fixed": "#001f25",
                    "on-tertiary-fixed": "#002020",

                    "on-primary-fixed-variant": "#004d63",

                    "primary": "#004a5f",
                    "tertiary-fixed": "#b4eded",
                    "error-container": "#ffdad6",

    <style>
        body { font-family: 'Lexend', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.22.0/dist/pocketbase.umd.js"></script>
    <script src="/app.js"></script>
    <script>
      if (!pb.authStore.isValid) {
        sessionStorage.setItem('redirect_message', 'Sesi berakhir, silakan login kembali.');
        window.location.href = '/index.html';
      } else if (pb.authStore.model?.role === 'teacher') {
        window.location.href = '/guru.html';
      }
    </script>
</head>
<body class="bg-[#EBF4F6] text-[#1a1a1a] antialiased">
<div class="flex h-screen w-full overflow-hidden bg-[#EBF4F6]">
    <!-- SideNavBar -->
    <aside class="hidden md:flex flex-col h-full w-64 bg-white p-4 space-y-2 border-r border-gray-100 shadow-sm shrink-0">
        <div class="mb-8 px-2 mt-4">
            <p class="text-2xl font-bold text-[#09637E] font-headline tracking-wide">Sidig Cika</p>
            <p class="inline-block mt-2 bg-[#7AB2B2] text-white text-[10px] font-bold px-2 py-0.5 rounded-full tracking-widest">SISWA</p>
            <span id="header-name" style="display: none;"></span>
        </div>
        
        <a class="flex items-center gap-3 px-4 py-3 text-[#6b7280] hover:bg-[#EBF4F6] hover:text-[#09637E] transition-all rounded-lg" href="/dashboard.html">
            <span class="material-symbols-outlined rounded" data-icon="dashboard">dashboard</span>
            <span class="font-medium text-sm">Dashboard</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-3 bg-[#EBF4F6] text-[#09637E] rounded-lg transition-all" href="/profile.html">
            <span class="material-symbols-outlined rounded" data-icon="person">person</span>
            <span class="font-medium text-sm">Profil</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-3 text-[#6b7280] hover:bg-[#EBF4F6] hover:text-[#09637E] transition-all rounded-lg" href="/pameran.html">
            <span class="material-symbols-outlined rounded" data-icon="gallery_thumbnail">gallery_thumbnail</span>
            <span class="font-medium text-sm">Pameran</span>
        </a>

        <div class="mt-auto pt-8 px-2 pb-4 border-t border-gray-100">
            <button onclick="logout()" class="flex items-center gap-3 w-full px-2 py-2 text-red-600 hover:text-red-700 transition-colors font-medium text-sm">
                <span class="material-symbols-outlined text-[18px]">logout</span>
                Keluar
            </button>
        </div>
    </aside>

    <div class="flex-1 w-full overflow-y-auto relative pb-24 md:pb-0">

    <main class="pt-8 pb-12 px-6 max-w-5xl mx-auto min-h-screen">
        <!-- Profile Hero Section -->
        <section class="mb-12">
            <div class="bg-white p-8 rounded-xl shadow-sm border border-[#EBF4F6] flex flex-col md:flex-row md:items-center justify-between gap-8">
                <div class="flex items-center gap-6">
                    <div id="avatar" class="w-16 h-16 md:w-20 md:h-20 bg-[#09637E] flex items-center justify-center rounded-full text-white text-xl font-bold">
                    </div>
                    <div>
                        <div class="flex xl:flex-row flex-col items-start xl:items-center gap-3 mb-1">
                            <h1 id="profile-name" class="text-2xl md:text-3xl font-bold text-[#1a1a1a]"></h1>
                            <div id="profile-kelas" class="text-[#7AB2B2]"></div>
                        </div>
                        <p id="profile-stats" class="text-[#6b7280] text-sm flex items-center gap-2 mt-2">
                            Memuat statistik...
                        </p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Submission History Section -->
        <section>
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-semibold text-[#1a1a1a]">Riwayat Karya</h2>
                <div class="flex items-center gap-2 text-sm text-[#6b7280]">
                    <span class="material-symbols-outlined text-base">sort</span>
                    <span>Terbaru</span>
                </div>
            </div>
            <div id="history-container" class="space-y-4">
                <p class="text-gray-500">Memuat riwayat...</p>
            </div>
        </section>
    </main>
    </div>
</div>

    <!-- Bottom Nav for Mobile -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center h-16 px-4 z-50">
        <a class="flex flex-col items-center gap-1 text-[#6b7280] hover:text-[#09637E]" href="/dashboard.html">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px] font-medium">Dashboard</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-[#09637E] font-bold" href="/profile.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
            <span class="text-[10px]">Profil</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-[#6b7280] hover:text-[#09637E]" href="/pameran.html">
            <span class="material-symbols-outlined">gallery_thumbnail</span>
            <span class="text-[10px] font-medium">Pameran</span>
        </a>
        <button class="flex flex-col items-center gap-1 text-red-600/70 hover:text-red-700" onclick="logout()">
            <span class="material-symbols-outlined">logout</span>
            <span class="text-[10px] font-medium">Keluar</span>
        </button>
    </nav>

    <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = pb.authStore.model;
      const name = user.name || 'User';
      document.getElementById('header-name').textContent = name;
      document.getElementById('profile-name').textContent = name;

      // Tampilkan kelas user
      const kelas = user.Kelas || user.kelas || '';
      const kelasEl = document.getElementById('profile-kelas');
      if (kelas) {
        kelasEl.innerHTML = `<span class="inline-block px-2 py-0.5 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">${kelas}</span>`;
      } else {
        kelasEl.textContent = 'Kelas belum diisi';
      }
      
      const avatar = document.getElementById('avatar');
      avatar.style.backgroundColor = getAvatarColor(name);
      avatar.textContent = getInitials(name);
      
      try {
        // Fetch specific submissions for this user to pass the PocketBase API List Rule checks
        const records = await pb.collection('submissions').getFullList({
          filter: `user_id = "${user.id}"`
        });
        records.sort((a, b) => new Date(b.created) - new Date(a.created));
        
        let terbaikId = null;
        let maxScore = -1;
        let acceptedCount = 0;

        records.forEach(r => {
          if (r.status === 'accepted') {
            acceptedCount++;
            if (r.score > maxScore) {
              maxScore = r.score;
              terbaikId = r.id;
            }
          }
        });

        document.getElementById('profile-stats').textContent = `${records.length} total naskah, ${acceptedCount} diterima.`;
        
        const container = document.getElementById('history-container');
        if (records.length === 0) {
          container.innerHTML = '<div class="bg-white p-6 rounded-xl shadow text-center text-gray-500">Belum ada riwayat submission.</div>';
        } else {
          container.innerHTML = '';
          records.forEach(record => {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-xl shadow p-6 flex flex-col md:flex-row gap-4 items-start md:items-center justify-between';
            
            let statusBadge = '';
            if (record.status === 'accepted') {
              statusBadge = '<span class="px-2 py-0.5 text-[12px] rounded-full bg-green-100 text-green-800 font-medium">Diterima</span>';
            } else if (record.status === 'rejected') {
              statusBadge = '<span class="px-2 py-0.5 text-[12px] rounded-full bg-red-100 text-red-800 font-medium">Ditolak</span>';
            } else {
              // pending
              statusBadge = '<span class="px-2 py-0.5 text-[12px] rounded-full font-medium" style="background:#fef9c3;color:#854d0e">Menunggu ACC</span>';
            }

            // Badge Terbaik: hanya untuk submission accepted dengan score tertinggi
            const isTerbaik = record.id === terbaikId && record.status === 'accepted';
            const badgeTerbaik = isTerbaik ? '<span class="px-2 py-0.5 text-[12px] rounded-full bg-yellow-100 text-yellow-800 ml-2 font-medium">✨ Terbaik</span>' : '';

            card.innerHTML = `
              <div class="flex-1">
                <div class="flex items-center gap-2 mb-1">
                  <h3 class="font-bold text-gray-900 text-lg">${record.title}</h3>
                  ${statusBadge} ${badgeTerbaik}
                </div>
                <div class="text-sm text-gray-500 mb-2">${formatDate(record.created)}</div>
                <div class="flex gap-4 text-sm">
                  <span class="flex items-center gap-1 text-gray-600"><i data-lucide="file-text" class="w-4 h-4"></i> ${record.word_count} kata</span>
                  <span class="flex items-center gap-1 text-gray-600"><i data-lucide="award" class="w-4 h-4"></i> Score: ${record.score}</span>
                </div>
              </div>
              <div>
                <button onclick="downloadPdf('${record.id}')" class="flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-lg text-sm font-medium transition">
                  <i data-lucide="download" class="w-4 h-4"></i> Unduh PDF
                </button>
              </div>
            `;
            container.appendChild(card);
          });
          lucide.createIcons();
        }
      } catch (e) {
        console.error("Fetch error:", e);
        document.getElementById('history-container').innerHTML = `<div class="bg-red-50 p-6 rounded-xl text-red-600"><strong>Gagal memuat riwayat:</strong><br/>${e.message || e}</div>`;
      }
      
      lucide.createIcons();
    });

    async function downloadPdf(recordId) {
      try {
        const record = await pb.collection('submissions').getOne(recordId);
        const url = pb.files.getUrl(record, record.file);
        window.open(url, '_blank');
      } catch (e) {
        showToast('Gagal mengunduh file.', 'error');
      }
    }
  </script>
</body>
</html>
