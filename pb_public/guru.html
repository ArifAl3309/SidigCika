<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Guru - NaskahSiswa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.22.0/dist/pocketbase.umd.js"></script>
  <script src="/app.js"></script>
  <script>
    if (!pb.authStore.isValid) {
      sessionStorage.setItem('redirect_message', 'Sesi berakhir, silakan login kembali.')
      window.location.href = '/index.html'
    } else if (pb.authStore.model?.role !== 'teacher') {
      window.location.href = '/dashboard.html'
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- HEADER -->
  <header class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="font-bold text-xl text-blue-600">NaskahSiswa</div>
        <span class="px-2 py-0.5 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">Guru</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-700" id="header-name"></span>
        <button onclick="logout()" class="text-sm text-red-600 hover:text-red-700 font-medium">Keluar</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">
    
    <!-- LEADERBOARD PENUH -->
    <section>
      <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2"><i data-lucide="trophy" class="w-5 h-5 text-amber-500"></i> Leaderboard (Semua Siswa)</h2>
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full text-left text-sm text-gray-600">
          <thead class="bg-gray-50 text-gray-900 uppercase">
            <tr>
              <th class="px-6 py-4 font-semibold w-16">#</th>
              <th class="px-6 py-4 font-semibold">Kelas</th>
              <th class="px-6 py-4 font-semibold">Total Poin</th>
              <th class="px-6 py-4 font-semibold text-right">Jumlah Karya</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body" class="divide-y divide-gray-100">
            <tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">Memuat leaderboard...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- SEMUA SUBMISSION -->
    <section>
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
        <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2"><i data-lucide="list" class="w-5 h-5 text-blue-500"></i> Semua Submission</h2>
        <div class="flex bg-gray-100 p-1 rounded-lg">
          <button onclick="setFilter('all')" id="tab-all" class="px-4 py-1.5 text-sm font-medium rounded-md bg-white shadow-sm text-gray-900">Semua</button>
          <button onclick="setFilter('pending')" id="tab-pending" class="px-4 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-900">Pending</button>
          <button onclick="setFilter('accepted')" id="tab-accepted" class="px-4 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-900">Diterima</button>
          <button onclick="setFilter('rejected')" id="tab-rejected" class="px-4 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-900">Ditolak</button>
        </div>
      </div>
      
      <div class="bg-white rounded-xl shadow overflow-hidden overflow-x-auto">
        <table class="w-full text-left text-sm text-gray-600 min-w-[800px]">
          <thead class="bg-gray-50 text-gray-900 uppercase">
            <tr>
              <th class="px-4 py-3 font-semibold">Nama / Tanggal</th>
              <th class="px-4 py-3 font-semibold">Kelas</th>
              <th class="px-4 py-3 font-semibold">Judul Naskah</th>
              <th class="px-4 py-3 font-semibold">Kata</th>
              <th class="px-4 py-3 font-semibold">Score</th>
              <th class="px-4 py-3 font-semibold">Status</th>
              <th class="px-4 py-3 font-semibold text-right">Aksi</th>
            </tr>
          </thead>
          <tbody id="submissions-body" class="divide-y divide-gray-100">
            <tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script>
    let allSubmissions = [];
    let currentFilter = 'all';

    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('header-name').textContent = pb.authStore.model.name || 'Guru';
      
      await loadAllData();
      
      pb.collection('submissions').subscribe('*', async () => {
        await loadAllData();
      });

      window.addEventListener('beforeunload', () => {
        pb.collection('submissions').unsubscribe('*');
      });
    });

    async function fetchAndRenderLeaderboard(records) {
      try {
        const kelasMap = {};
        records.forEach(r => {
          if (r.status !== 'accepted') return;
          const kelas = r.expand?.user_id?.Kelas ?? 'Tidak Diketahui';
          if (!kelasMap[kelas]) {
            kelasMap[kelas] = { Kelas: kelas, totalScore: 0, jumlahKarya: 0 };
          }
          kelasMap[kelas].totalScore  += r.score;
          kelasMap[kelas].jumlahKarya += 1;
        });

        const sorted = Object.values(kelasMap).sort((a, b) => b.totalScore - a.totalScore);
        renderLeaderboard(sorted);
      } catch (e) {
        document.getElementById('leaderboard-body').innerHTML = '<tr><td colspan="4" class="px-6 py-4 text-center text-red-500">Gagal memuat leaderboard.</td></tr>';
      }
    }

    function renderLeaderboard(data) {
      const tbody = document.getElementById('leaderboard-body');
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">Belum ada karya yang di-ACC.</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      data.forEach((item, index) => {
        const rank = index + 1;
        let bgClass = '';
        if (rank === 1) bgClass = 'bg-[#fef9c3]';
        else if (rank === 2) bgClass = 'bg-[#f3f4f6]';
        else if (rank === 3) bgClass = 'bg-[#fff7ed]';

        let rankHtml = `<span class="font-medium text-gray-500">${rank}</span>`;
        if (rank === 1) rankHtml = `<span class="inline-flex w-6 h-6 items-center justify-center rounded-full bg-yellow-400 text-white font-bold text-xs">1</span>`;
        if (rank === 2) rankHtml = `<span class="inline-flex w-6 h-6 items-center justify-center rounded-full bg-gray-300 text-gray-700 font-bold text-xs">2</span>`;
        if (rank === 3) rankHtml = `<span class="inline-flex w-6 h-6 items-center justify-center rounded-full bg-orange-300 text-white font-bold text-xs">3</span>`;

        const tr = document.createElement('tr');
        if (bgClass) tr.className = bgClass;
        tr.innerHTML = `
          <td class="px-6 py-4">${rankHtml}</td>
          <td class="px-6 py-4 font-semibold text-gray-900">${item.Kelas}</td>
          <td class="px-6 py-4 font-bold text-blue-600">${item.totalScore}</td>
          <td class="px-6 py-4 text-right text-gray-600">${item.jumlahKarya}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function loadAllData() {
      try {
        const records = await pb.collection('submissions').getFullList({
          expand: 'user_id'
        });
        records.sort((a, b) => new Date(b.created) - new Date(a.created));
        allSubmissions = records;
        fetchAndRenderLeaderboard(records);
        renderSubmissions();
      } catch (e) {
        if(typeof showToast === 'function') showToast('Gagal memuat data dari server.', 'error');
      }
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.getElementById('tab-all').className     = getTabClass(filter === 'all');
      document.getElementById('tab-pending').className  = getTabClass(filter === 'pending');
      document.getElementById('tab-accepted').className = getTabClass(filter === 'accepted');
      document.getElementById('tab-rejected').className = getTabClass(filter === 'rejected');
      renderSubmissions();
    }

    function getTabClass(isActive) {
      return isActive 
        ? "px-4 py-1.5 text-sm font-medium rounded-md bg-white shadow-sm text-gray-900 transition" 
        : "px-4 py-1.5 text-sm font-medium rounded-md text-gray-500 hover:text-gray-900 transition";
    }

    function renderSubmissions() {
      const tbody = document.getElementById('submissions-body');

      const filtered = allSubmissions.filter(r => currentFilter === 'all' || r.status === currentFilter);

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-gray-500">Tidak ada data.</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      filtered.forEach(record => {
        const name  = record.expand?.user_id?.name  || 'Unknown';
        const kelas = record.expand?.user_id?.Kelas || record.expand?.user_id?.kelas || '-';

        let statusBadge = '';
        if (record.status === 'accepted') {
          statusBadge = '<span class="px-2 py-0.5 text-[12px] rounded-full bg-green-100 text-green-800 font-medium">Diterima</span>';
        } else if (record.status === 'rejected') {
          statusBadge = '<span class="px-2 py-0.5 text-[12px] rounded-full bg-red-100 text-red-800 font-medium">Ditolak</span>';
        } else {
          statusBadge = '<span class="px-2 py-0.5 text-[12px] rounded-full font-medium" style="background:#fef9c3;color:#854d0e">Menunggu ACC</span>';
        }

        // Tombol "Lihat" selalu ada untuk semua status
        // Pending: Lihat + ACC + Tolak
        // Accepted/Rejected: Lihat + Hapus
        let aksiBtns = `
            <button onclick="downloadPdf('${record.id}')" title="Lihat / Unduh PDF"
              class="flex items-center gap-1 px-2 py-1 text-xs font-medium text-blue-700 bg-blue-50 hover:bg-blue-100 border border-blue-200 rounded">
              <i data-lucide="eye" class="w-3.5 h-3.5"></i> Lihat
            </button>`;

        if (record.status === 'pending') {
          aksiBtns += `
            <button onclick="accKarya('${record.id}')" title="Terima Karya"
              class="flex items-center gap-1 px-2 py-1 text-xs font-medium text-green-700 bg-green-50 hover:bg-green-100 border border-green-200 rounded">
              <i data-lucide="check-circle" class="w-3.5 h-3.5"></i> ACC
            </button>
            <button onclick="tolakKarya('${record.id}')" title="Tolak Karya"
              class="flex items-center gap-1 px-2 py-1 text-xs font-medium text-red-700 bg-red-50 hover:bg-red-100 border border-red-200 rounded">
              <i data-lucide="x-circle" class="w-3.5 h-3.5"></i> Tolak
            </button>`;
        } else {
          aksiBtns += `
            <button onclick="deleteSubmission('${record.id}')" title="Hapus"
              class="flex items-center gap-1 px-2 py-1 text-xs font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 border border-gray-200 rounded">
              <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Hapus
            </button>`;
        }

        const tr = document.createElement('tr');
        tr.className = 'hover:bg-gray-50';
        tr.innerHTML = `
          <td class="px-4 py-3">
            <div class="font-medium text-gray-900">${name}</div>
            <div class="text-xs text-gray-500">${formatDate(record.created)}</div>
          </td>
          <td class="px-4 py-3 text-sm text-gray-600">${kelas}</td>
          <td class="px-4 py-3 font-medium">${record.title}</td>
          <td class="px-4 py-3">${record.word_count}</td>
          <td class="px-4 py-3 font-bold text-gray-900">${record.score}</td>
          <td class="px-4 py-3">${statusBadge}</td>
          <td class="px-4 py-3 text-right">
            <div class="flex items-center justify-end gap-2">${aksiBtns}</div>
          </td>
        `;
        tbody.appendChild(tr);
      });
      lucide.createIcons();
    }

    async function downloadPdf(recordId) {
      try {
        const record = allSubmissions.find(r => r.id === recordId) || await pb.collection('submissions').getOne(recordId);
        const url = pb.files.getUrl(record, record.file);
        window.open(url, '_blank');
      } catch (e) {
        if(typeof showToast === 'function') showToast('Gagal mengunduh file.', 'error');
      }
    }

    async function deleteSubmission(recordId) {
      if (confirm('Yakin hapus submission ini?')) {
        try {
          await pb.collection('submissions').delete(recordId);
          // Tabel update otomatis via real-time subscription
          if(typeof showToast === 'function') showToast('Naskah berhasil dihapus.', 'success');
        } catch (e) {
          if(typeof showToast === 'function') showToast('Gagal menghapus. Coba lagi.', 'error');
        }
      }
    }
  </script>
</body>
</html>
